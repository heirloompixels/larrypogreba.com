base_url = "https://larrypogreba.com"
title = "Larry Pogreba"
description = "Guitar builder and bladesmith."
compile_sass = false
minify_html = false
default_language = "en"

taxonomies = []

[slugify]
paths = "on"
anchors = "on"

[markdown]
render_emoji = true
external_links_target_blank = true
smart_punctuation = true

[link_checker]
internal_level = "warn"

[extra]
author = "Larry Pogreba"
default_theme = "light"
twitter_card = true



# Whether to build a search index to be used later on by a JavaScript library
build_search_index = false
