<!DOCTYPE html>
<html lang="{{ config.default_language }}">
<head>
    {% include "head.html" %}
</head>
<body>
      <header class="site-header">
          <div class="brand">
              <a href="{{ get_url(path='/', trailing_slash=true) | safe }}">
                  <img src="{{ get_url(path='/logo.svg') | safe }}" alt="Larry Pogreba logo" />
                  <span>{{ config.title }}</span>
              </a>
          </div>
          <nav class="site-nav">
              <a href="{{ get_url(path='/', trailing_slash=true) | safe }}">Home</a>
              <a href="{{ get_url(path='/about/', trailing_slash=true) | safe }}">About</a>
              <a href="{{ get_url(path='/guitars/', trailing_slash=true) | safe }}">Guitars</a>
              <a href="{{ get_url(path='/guitar-building/', trailing_slash=true) | safe }}">Guitar Building</a>
              <a href="{{ get_url(path='/listen/', trailing_slash=true) | safe }}">Listen</a>
              <a href="{{ get_url(path='/videos/', trailing_slash=true) | safe }}">Videos</a>
              <a href="{{ get_url(path='/who-plays/', trailing_slash=true) | safe }}">Who Plays</a>
              <a href="{{ get_url(path='/knives/', trailing_slash=true) | safe }}">Knives</a>
              <a href="{{ get_url(path='/gallery/', trailing_slash=true) | safe }}">Gallery</a>
              <a href="{{ get_url(path='/contact/', trailing_slash=true) | safe }}">Contact</a>
          </nav>
      </header>
      <main class="page">
          {% block content %}
          {% endblock content %}
      </main>
      <footer class="site-footer">
          <div>Hand-built guitars and blades from Montana and New Mexico.</div>
          <div class="subtle">Phone: 406.285.6556 · Email: pogrebas@gmail.com</div>
      </footer>
</body>
</html>
